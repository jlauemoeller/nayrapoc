version: "3"
services:
  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=12345678
      - MINIO_API_CORS_ALLOW_ORIGIN=http://localhost:3000
    volumes:
      - ./data/minio:/data
    command: server /data --console-address ":9001"

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    environment:
      - MINIO_BUCKET=${OBJECT_STORAGE_BUCKET:-nayra}
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 admin 12345678 >/dev/null 2>&1; do
        echo 'waiting for minio...'; sleep 1;
      done;
      /usr/bin/mc mb --ignore-existing local/$$MINIO_BUCKET;
      /usr/bin/mc anonymous set download local/$$MINIO_BUCKET;
      echo 'minio bucket ready';
      "
